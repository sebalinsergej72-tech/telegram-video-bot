name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger Railway deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          endpoint = "https://backboard.railway.com/graphql/v2"
          token = os.environ["RAILWAY_TOKEN"]
          expected_commit = os.environ["GITHUB_SHA"]

          def call_graphql(query: str, variables: dict, timeout: int = 180) -> dict:
              payload = json.dumps({"query": query, "variables": variables}).encode()
              request = urllib.request.Request(
                  endpoint,
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request, timeout=timeout) as response:
                  return json.loads(response.read().decode())

          trigger_query = """
          mutation Deploy($input: GitHubRepoDeployInput!) {
            githubRepoDeploy(input: $input)
          }
          """
          trigger_variables = {
              "input": {
                  "projectId": "560033cc-d011-4f05-b387-a3266555c2e0",
                  "environmentId": "b0a5bba7-d551-4e5b-ba36-3290dbd18552",
                  "repo": "sebalinsergej72-tech/telegram-video-bot",
                  "branch": "main",
              }
          }

          trigger_response = call_graphql(trigger_query, trigger_variables)
          if trigger_response.get("errors"):
              print(json.dumps(trigger_response, ensure_ascii=False, indent=2))
              sys.exit(1)

          print("Triggered deployment:", trigger_response["data"]["githubRepoDeploy"])

          deployments_query = """
          query Deployments($input: DeploymentListInput!) {
            deployments(input: $input, first: 10) {
              edges {
                node {
                  id
                  status
                  createdAt
                  meta
                }
              }
            }
          }
          """
          deployments_variables = {
              "input": {
                  "projectId": "560033cc-d011-4f05-b387-a3266555c2e0",
                  "environmentId": "b0a5bba7-d551-4e5b-ba36-3290dbd18552",
                  "serviceId": "32262f08-60d1-474e-8d63-84514c4258b2",
                  "includeDeleted": True,
              }
          }

          for attempt in range(30):
              response = call_graphql(deployments_query, deployments_variables, timeout=30)
              if response.get("errors"):
                  print(json.dumps(response, ensure_ascii=False, indent=2))
                  sys.exit(1)

              deployments = response["data"]["deployments"]["edges"]
              for edge in deployments:
                  deployment = edge["node"]
                  meta = deployment.get("meta") or {}
                  commit_hash = meta.get("commitHash")
                  status = deployment["status"]
                  if commit_hash == expected_commit:
                      print(f"Found deployment {deployment['id']} with status {status}")
                      if status == "SUCCESS":
                          sys.exit(0)
                      if status in {"FAILED", "CRASHED", "REMOVED"}:
                          sys.exit(1)

              print(f"Waiting for deployment of {expected_commit} (attempt {attempt + 1}/30)")
              time.sleep(10)

          print(f"Timed out waiting for deployment of {expected_commit}")
          sys.exit(1)
          PY
