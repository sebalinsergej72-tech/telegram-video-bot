name: Temporary Audio Download

on:
  push:
    branches:
      - codex/audio-download
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      TARGET_URL: https://youtu.be/kciEjgWCeXA?si=fB1GenKGLLOsN7Q4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download audio
        run: yt-dlp -x --audio-format mp3 --audio-quality 0 -o "output.%(ext)s" "$TARGET_URL"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-audio
          path: output.mp3
